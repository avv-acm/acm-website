<style>
        body {
            background-color: #0A0A0A;
            overflow-x: hidden;
            color: #e5e2e1;
        }

        .liquid-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.6;
        }

        .blob-1 {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #007AFF 0%, transparent 70%);
            top: -50px;
            left: -50px;
            animation: move-1 15s infinite alternate ease-in-out;
        }

        .blob-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #BF5AF2 0%, transparent 70%);
            bottom: 100px;
            right: -100px;
            animation: move-2 20s infinite alternate ease-in-out;
        }

        @keyframes move-1 {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 150px) scale(1.2); }
        }

        @keyframes move-2 {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(-100px, -200px) scale(0.8); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .liquid-button {
            background: linear-gradient(135deg, #007AFF, #BF5AF2);
            box-shadow: 0 8px 32px rgba(0, 122, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .liquid-button:active {
            transform: scale(0.96);
            box-shadow: 0 4px 16px rgba(0, 122, 255, 0.4);
        }

        .interest-chip.active {
            background: rgba(173, 198, 255, 0.2);
            border-color: #adc6ff;
            color: #adc6ff;
        }

        ::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="font-body-lg text-body-lg">
<!-- Atmospheric Background -->
<div class="liquid-bg">
<div class="blob-1"></div>
<div class="blob-2"></div>
</div>
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 flex items-center px-margin-mobile h-16 w-full bg-surface/10 backdrop-blur-xl border-b border-white/5">
<button class="material-symbols-outlined text-primary active:scale-95 duration-200" style="font-variation-settings: 'FILL' 0;">arrow_back</button>
<span class="ml-4 font-headline-lg-mobile text-headline-lg-mobile font-semibold text-primary">Event Registration</span>
</header>
<main class="pt-24 pb-32 px-margin-mobile space-y-6">
<!-- Headline Section -->
<section class="space-y-2">
<h1 class="font-display-lg text-display-lg text-white font-extrabold tracking-tight">HackNight 2026</h1>
<p class="text-on-surface-variant font-medium flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">calendar_month</span>
                Saturday June 28, 2026 • 6:00 PM to 11:00 PM
            </p>
</section>
<!-- Location Card -->
<section class="glass-card rounded-3xl p-4 flex items-center gap-4">
<div class="w-12 h-12 rounded-2xl bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
<div>
<h3 class="text-white font-semibold font-title-md text-title-md">Amrita School of Computing</h3>
<p class="text-on-surface-variant text-sm">Main Tech Hub, Block C</p>
</div>
</section>
<!-- Capacity Bar -->
<section class="space-y-3">
<div class="flex justify-between items-end">
<span class="font-label-caps text-label-caps text-primary uppercase">Current Capacity</span>
<span class="font-mono-code text-mono-code text-white">42 / 60 Seats</span>
</div>
<div class="h-3 w-full bg-white/5 rounded-full overflow-hidden border border-white/5">
<div class="h-full w-[70%] liquid-button rounded-full shadow-[0_0_15px_rgba(0,122,255,0.5)]"></div>
</div>
<p class="text-[12px] text-on-surface-variant/60 italic text-center">70% filled — Register soon to secure your spot!</p>
</section>
<!-- Registration Form -->
<section class="space-y-4">
<div class="glass-card rounded-2xl p-1">
<input class="w-full bg-transparent border-none focus:ring-0 px-4 py-4 text-white placeholder:text-on-surface-variant/40 font-body-lg" placeholder="Full Name" type="text"/>
</div>
<div class="glass-card rounded-2xl p-1">
<input class="w-full bg-transparent border-none focus:ring-0 px-4 py-4 text-white placeholder:text-on-surface-variant/40 font-body-lg" placeholder="University Email" type="email"/>
</div>
<div class="space-y-3">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1 uppercase">Academic Year</label>
<div class="grid grid-cols-4 gap-2">
<button class="glass-card py-3 rounded-xl text-white font-medium hover:bg-white/10 active:scale-95 transition-all text-sm">1st</button>
<button class="glass-card py-3 rounded-xl text-white font-medium hover:bg-white/10 active:scale-95 transition-all text-sm border-primary/40 bg-primary/10">2nd</button>
<button class="glass-card py-3 rounded-xl text-white font-medium hover:bg-white/10 active:scale-95 transition-all text-sm">3rd</button>
<button class="glass-card py-3 rounded-xl text-white font-medium hover:bg-white/10 active:scale-95 transition-all text-sm">4th</button>
</div>
</div>
</section>
<!-- Interest Chips -->
<section class="space-y-3">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-1 uppercase">Interests</label>
<div class="flex flex-wrap gap-2">
<button class="interest-chip active px-4 py-2 rounded-full border border-white/10 glass-card text-sm font-medium transition-all">AI</button>
<button class="interest-chip px-4 py-2 rounded-full border border-white/10 glass-card text-sm font-medium transition-all">ML</button>
<button class="interest-chip active px-4 py-2 rounded-full border border-white/10 glass-card text-sm font-medium transition-all">Web Dev</button>
<button class="interest-chip px-4 py-2 rounded-full border border-white/10 glass-card text-sm font-medium transition-all">Systems</button>
<button class="interest-chip px-4 py-2 rounded-full border border-white/10 glass-card text-sm font-medium transition-all">Cybersec</button>
</div>
</section>
<!-- CTA -->
<button class="w-full py-5 rounded-2xl liquid-button text-white font-bold font-title-md text-title-md mt-4 relative overflow-hidden group">
<span class="relative z-10">Register Now</span>
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
</main>
<!-- Bottom Navigation Bar (Glass Dock) -->
<nav class="fixed bottom-8 left-0 right-0 mx-auto w-[calc(100%-40px)] max-w-[400px] flex justify-around items-center p-2 z-50 bg-white/10 backdrop-blur-2xl border border-white/10 rounded-full shadow-2xl">
<a class="flex items-center justify-center text-on-surface-variant/60 p-3 hover:bg-white/5 transition-all active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
</a>
<a class="flex items-center justify-center bg-primary/20 text-primary rounded-full p-3 hover:bg-white/5 transition-all active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="calendar_month" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
</a>
<a class="flex items-center justify-center text-on-surface-variant/60 p-3 hover:bg-white/5 transition-all active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="terminal">terminal</span>
</a>
<a class="flex items-center justify-center text-on-surface-variant/60 p-3 hover:bg-white/5 transition-all active:scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
</a>
</nav>
<script>
        // Simple micro-interaction for interest chips
        document.querySelectorAll('.interest-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                chip.classList.toggle('active');
                if(chip.classList.contains('active')) {
                    chip.style.borderColor = '#adc6ff';
                    chip.style.backgroundColor = 'rgba(173, 198, 255, 0.2)';
                    chip.style.color = '#adc6ff';
                } else {
                    chip.style.borderColor = 'rgba(255, 255, 255, 0.1)';
                    chip.style.backgroundColor = 'rgba(255, 255, 255, 0.08)';
                    chip.style.color = '#e5e2e1';
                }
            });
        });

        // Simple parallax effect for background blobs
        window.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 50;
            const moveY = (e.clientY - window.innerHeight / 2) / 50;
            document.querySelector('.blob-1').style.transform = `translate(${moveX}px, ${moveY}px)`;
            document.querySelector('.blob-2').style.transform = `translate(${-moveX}px, ${-moveY}px)`;
        });
    </script>
</body></html>
